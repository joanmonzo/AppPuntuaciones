<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/the-golfos-on-tour-2026-logo.ico" />
    <link rel="apple-touch-icon" href="/the-golfos-on-tour-2026-logo.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="manifest" href="/manifest.json" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => console.log('ServiceWorker registrado:', registration.scope))
            .catch(error => console.log('Error al registrar ServiceWorker:', error));
        });
      }
    </script>
  </body>
